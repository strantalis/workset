site_name: Workset
site_description: Multi-repo threads with linked worktrees
site_url: https://workset.dev
repo_url: https://github.com/strantalis/workset
repo_name: strantalis/workset
edit_uri: edit/main/docs/
copyright: © 2026 Sean Strantalis

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.action.view

extra_css:
  - https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js
  - javascripts/mermaid.js

markdown_extensions:
  - toc
  - tables
  - fenced_code
  - meta
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - social
  - glightbox:
      touchNavigation: true
      loop: false
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true
  - gen-files:
      scripts:
        - scripts/gen_releases.py
        - scripts/gen_update_manifests.py

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI:
      - Overview: cli.md
      - Command Index: commands.md
  - Desktop App: desktop-app.md
  - Reference:
      - Concepts: concepts.md
      - Config: config.md
  - Releases: releases/index.md
